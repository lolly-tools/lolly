# Quality gate — runs on every push to main and every PR.
# Independent gates run in parallel (plans/qa-audit-2026-06-28.md #1):
#   test            — full repo suite (engine contract tests + core/web/mcp)
#   typecheck       — tsc -p across every project
#   validate        — catalog manifests/index drift + asset checksums
#   smoke           — render every catalog tool at manifest defaults (headless,
#                     browser-free); a hooks.js regression that renders blank
#                     fails here instead of shipping green
#   build + budget  — production web build (hard gate), then the boot-path
#                     bundle budget (scripts/check-bundle-budget.ts is
#                     deliberately NOT part of build:web, so CI runs it after).
#   api-bundles     — regenerate the committed api/ function bundles and fail
#                     on drift (they are generated esbuild output, like
#                     catalog/tools/index.json).
# All gates (test / typecheck / validate / smoke / build+budget / api-bundles)
# exit non-zero on failure and BLOCK. The bundle-budget step is a hard gate again as of the boot
# diet (2026-07-08): boot JS is ~66 KB gz vs the 115 KB budget, after the engine
# barrel was pulled off the boot path (it had dragged c2pa-trust/design-map/
# pdf-map/pptx/emf/… onto first paint). See plans/fable-advice.md.
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Cancel an in-flight run when new commits land on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive   # tools/catalog/shells/services/docs are submodules; workspaces need every package.json

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install (workspaces)
        run: npm ci

      # Conformance binaries — the C2PA/PDF conformance tests (tests/c2pa-c2patool-
      # conformance.test.ts + gated cases in c2pa.test.ts / c2pa-formats.test.ts)
      # skip silently when qpdf/c2patool aren't on PATH. Install both so they run.
      - name: Install qpdf (PDF conformance checks)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends qpdf

      - name: Cache c2patool
        id: c2patool-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/c2patool
          key: c2patool-v0.26.70-x86_64-unknown-linux-gnu

      - name: Install c2patool (C2PA conformance checks)
        if: steps.c2patool-cache.outputs.cache-hit != 'true'
        run: |
          curl -fsSL -o /tmp/c2patool.tar.gz \
            "https://github.com/contentauth/c2pa-rs/releases/download/c2patool-v0.26.70/c2patool-v0.26.70-x86_64-unknown-linux-gnu.tar.gz"
          tar -xzf /tmp/c2patool.tar.gz -C /tmp
          mkdir -p ~/.cache/c2patool
          install -m 0755 /tmp/c2patool/c2patool ~/.cache/c2patool/c2patool

      - name: Put c2patool on PATH
        run: |
          echo "$HOME/.cache/c2patool" >> "$GITHUB_PATH"
          "$HOME/.cache/c2patool/c2patool" --version

      - name: Full test suite
        # tee so the skip-visibility step below can read the summary; pipefail
        # keeps the suite's exit code authoritative through the pipe.
        run: |
          set -o pipefail
          npm test 2>&1 | tee test-output.log

      - name: Skipped-test visibility (informational, never gates)
        if: always()
        run: |
          # node:test prints a run summary — "ℹ skipped N" (spec reporter) or
          # "# skipped N" (tap, the non-TTY default on some Node lines). Strip
          # ANSI colour codes first, then surface the counts in the job log.
          sed $'s/\x1b\[[0-9;]*m//g' test-output.log \
            | grep -E '^(#|ℹ) (tests|pass|fail|skipped|todo) [0-9]+' \
            || echo 'no node:test summary found in test-output.log'

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install (workspaces)
        run: npm ci

      - name: Typecheck (tsc -p, every project)
        run: npm run typecheck

  validate-catalog:
    name: validate catalog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install (workspaces)
        run: npm ci

      - name: Validate catalog (no manifest/index drift, asset checksums)
        run: npm run validate:catalog

  # Catalog-wide render gate — `lolly smoke` renders every tool in the active profile
  # at manifest defaults (sequential, browser-free: first Node-native format, html as
  # the layout fallback) and exits non-zero on any failed render. CI checks out the
  # public submodules only (brands/suse is `update = none`), so postinstall builds the
  # lolly-start fallback profile — the community tools are what gets smoked here; a
  # SUSE-profile smoke is a local/`loldev` concern.
  smoke:
    name: smoke (render every tool)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install (workspaces)
        run: npm ci

      - name: Smoke-render the catalog (headless, no browser)
        run: npm run smoke

  build:
    name: build + bundle budget
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install (workspaces)
        run: npm ci

      - name: Production build (info site + OG cards + web shell)
        run: npm run build:web

      - name: Bundle budget (boot-path JS ≤ 115 KB gz, no heavy chunks preloaded)
        run: npm run check:bundle

  # The committed api/ function bundles (api/mcp/[...path].js, api/ca/[...path].js)
  # are GENERATED by esbuild (scripts/build-mcp-fn.ts / build-ca-fn.ts) and checked
  # in only so Vercel sees them at function-detection time. Same discipline as the
  # generated catalog/tools/index.json: regenerate, then fail on any drift.
  api-bundles:
    name: api bundle drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install (workspaces)
        run: npm ci

      - name: Rebuild the api/ function bundles
        run: npm run build:mcp-fn && npm run build:ca-fn

      - name: No drift (stale bundle? rerun build:mcp-fn / build:ca-fn and commit)
        run: git diff --exit-code -- api/

  # Self-test of the in-tree composite action (action/ — ready to split into
  # lolly-tools/render-action, plans/fable-new-potential.md §5.4). Exercises the
  # real consumer path end-to-end: the action checks out lolly at THIS commit,
  # npm ci builds the lolly-start fallback profile, and qr-code renders to SVG
  # browser-free (Tier A) — so the action stays green before the split.
  render-action:
    name: render-action self-test
    runs-on: ubuntu-latest
    steps:
      # No submodules: this job only needs action/ itself — the action performs
      # its own pinned lolly checkout into a work dir.
      - uses: actions/checkout@v4

      - name: Render qr-code via the composite action (svg, no browser)
        id: render
        uses: ./action
        with:
          tool: qr-code
          args: --url=https://lolly.tools
          format: svg
          lolly-ref: ${{ github.sha }}

      - name: Assert the render landed and the outputs are wired
        env:
          OUT_DIR: ${{ steps.render.outputs.out-dir }}
          FILES: ${{ steps.render.outputs.files }}
        run: |
          test -s "$OUT_DIR/qr-code.svg"
          grep -q '<svg' "$OUT_DIR/qr-code.svg"
          [ "$FILES" = "qr-code.svg" ]
          echo "rendered: $FILES → $OUT_DIR"
