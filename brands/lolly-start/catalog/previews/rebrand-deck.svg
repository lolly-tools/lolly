<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720"><text x="561.48" y="300" dominant-baseline="text-before-edge" font-family="-apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, Roboto, sans-serif" font-size="22" font-weight="650">Rebrand a deck</text><g dominant-baseline="text-before-edge" font-family="-apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, Roboto, sans-serif" font-size="14" font-weight="400"><text x="440.02" y="340">Drag a PowerPoint file anywhere onto this area, or choose one</text><text x="437.61" y="361">below. We read its theme, colours and typefaces, snap them to</text><text x="539.03" y="382">your brand, and rebuild the file.</text></g><text x="455.69" y="471" dominant-baseline="text-before-edge" font-family="-apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, Roboto, sans-serif" font-size="12" font-weight="400">Everything happens on your device. Your deck is never uploaded.</text><text x="583.13" y="429" dominant-baseline="text-before-edge" font-family="-apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, Roboto, sans-serif" font-size="14" font-weight="600">Choose a .pptx…</text></svg>