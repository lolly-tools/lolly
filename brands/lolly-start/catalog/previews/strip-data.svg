<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720"><path fill="#fff" d="M0 0h1280v720H0z"/><text x="445.81" y="294" fill="#030711" dominant-baseline="text-before-edge" font-family="SUSE, system-ui, sans-serif" font-size="22" font-weight="700">Strip hidden data from an image or PDF</text><g fill="#4e5e74" dominant-baseline="text-before-edge" font-family="SUSE, system-ui, sans-serif" font-size="14" font-weight="400"><text x="428.58" y="336">Drag a JPEG, PNG, SVG or PDF anywhere onto this area, or choose one</text><text x="438.78" y="357">below. We&apos;ll show you the GPS location, camera, author, editor and</text><text x="443.61" y="378">document metadata it&apos;s carrying — then hand back a clean copy.</text></g><text x="443.14" y="470" fill="#0e1217" dominant-baseline="text-before-edge" font-family="SUSE, system-ui, sans-serif" font-size="14" font-weight="600">Everything happens in your browser. Your file is never uploaded.</text><text x="594.69" y="424" fill="#0e1217" dominant-baseline="text-before-edge" font-family="SUSE, system-ui, sans-serif" font-size="14" font-weight="700">Choose a file…</text></svg>