<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" xmlns:c2pa="http://c2pa.org/manifest"><metadata><c2pa:manifest></c2pa:manifest></metadata><path fill="#fff" d="M0 0h1280v720H0z"/><rect width="478" height="338" x="401" y="191" fill="none" stroke="#cbd5e2" stroke-dasharray="6 4" stroke-width="2" rx="15" ry="15"/><text x="551.17" y="300" fill="#030711" dominant-baseline="text-before-edge" font-family="-apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, Roboto, sans-serif" font-size="22" font-weight="650">Convert an image</text><g fill="#4e5e74" dominant-baseline="text-before-edge" font-family="-apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, Roboto, sans-serif" font-size="14" font-weight="400"><text x="441.94" y="340">Drag an image anywhere onto this area, or choose one below.</text><text x="430.23" y="361">HEIC and HEIF (iPhone photos), AVIF, TIFF, JPEG, PNG and WebP</text><text x="502.53" y="382">come in — WebP, JPEG or PNG comes out.</text></g><text x="451.3" y="471" fill="#4e5e74" fill-opacity=".85" dominant-baseline="text-before-edge" font-family="-apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, Roboto, sans-serif" font-size="12" font-weight="400">Everything happens in your browser. Your photo is never uploaded.</text><text x="575.92" y="429" fill="#f3f5f8" dominant-baseline="text-before-edge" font-family="-apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, Roboto, sans-serif" font-size="14" font-weight="600">Choose an image…</text></svg>