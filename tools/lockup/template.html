<svg id="lockup-svg" xmlns="http://www.w3.org/2000/svg"
     width="{{svgW}}" height="{{svgH}}" viewBox="0 0 {{svgW}} {{svgH}}"
     style="width:100%;height:auto;display:block;">
  <rect id="lockup-bg" width="100%" height="100%" fill="{{background}}"/>
  <foreignObject x="0" y="0" width="{{svgW}}" height="{{svgH}}" id="lockup-fo">
    <div xmlns="http://www.w3.org/1999/xhtml"
         style="box-sizing:border-box;background:{{background}};">
      {{{htmlLines}}}
    </div>
  </foreignObject>
  <g id="lockup-paths">{{{svgPaths}}}</g>
</svg>
<script>
/* Sync canvas height to the SVG's auto-computed height after each render.
   RAF fires once per render (not persistent — no observer accumulation). */
(function () {
  var canvas = document.getElementById('tool-canvas');
  if (!canvas) return;
  requestAnimationFrame(function () {
    var svg = canvas.querySelector('#lockup-svg');
    if (!svg) return;
    var h = Math.round(svg.getBoundingClientRect().height);
    if (h > 0 && parseInt(canvas.style.height, 10) !== h) {
      canvas.style.height = h + 'px';
      canvas.dispatchEvent(new CustomEvent('canvas-resize'));
    }
  });
}());
</script>
<style>
.logotext{  margin-left: .075em;}
</style>
