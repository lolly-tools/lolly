<div class="artboard" style="background:{{lookup bgStyle 0}}">
  {{#each boxes}}
  <div class="lolly-box" data-canvas-input="boxes:{{@index}}" data-box-id="{{default id @index}}" style="{{lookup ../boxStyle @index}}">
    {{#if image}}<img class="lolly-box-img" src="{{asset image}}" alt="" draggable="false">{{/if}}
    {{#if text}}<div class="lolly-box-text" style="{{lookup ../textStyle @index}}">{{text}}</div>{{/if}}
  </div>
  {{/each}}
</div>
